# Difference-vector steering: RGB decoder for the scene-paired moving-ball dataset (256x256, 16 frames).
# Supervisor's 2026-06-26 proposal. Smaller than physics_iq_transformer_large (depth 12 not 24) — this
# data is far simpler than Physics-IQ, so a lighter transformer suffices, per the supervisor's note.
# Decodes the full multi-scale latent state [6,12,18,23] (the "full latent state" H in R^{8x256x1024}
# per layer) so the difference vector H_b-H_a is steered across the whole representation.
#
# Train:  CONFIG=configs/train/moving_ball_scene_decoder.yaml \
#         LATENT_DIR=.../moving_ball_scene/train/vjepa2_large \
#         OUTPUT_DIR=.../runs/moving_ball_scene_decoder  sbatch scripts/slurm_train_decoder.sh
encoder:
  name: vjepa2
  hf_model_id: facebook/vjepa2-vitl-fpc64-256
  hidden_dim: 1024
  num_layers: 24
  num_heads: 16
  patch_size: 16
  tubelet_size: 2
  image_size: 256          # native VJEPA2-L resolution -> 16x16=256 spatial tokens (the spec's 8x256)
  num_frames: 16           # tubelet 2 -> 8 temporal tokens
  frozen: true
  layers: [6, 12, 18, 23]  # multi-scale decoding from the full latent state

decoder:
  name: transformer
  mode: reconstruct
  hidden_dim: 1024
  depth: 12                # smaller decoder: simple scene, a shallow transformer is enough
  heads: 16
  mlp_ratio: 4.0
  dropout: 0.0
  num_query_tokens_per_frame: 256   # 16x16 queries/frame -> patch 256/16 = 16
  use_layer_embedding: true
  gradient_checkpointing: true
  out_image_size: 256
  out_num_frames: 16
  out_channels: 3

data:
  name: moving_ball
  root: null
  image_size: 256
  num_frames: 16
  fps: 4
  scenario: scene_velocity
  clips_per_scene: 4
  categories: all
  split: train
  num_clips: 2000
  speed_range: [0.012, 0.045]
  radius_range: [0.11, 0.11]
  seed: 0

loss:
  # Same hard-won fixes that beat the background-collapse trap on the 128px ball (see brain.md / memory):
  #   target compression off {0,1} so the white-bg optimum is a finite, non-saturated logit;
  #   separate-mean foreground weighting so neither uniform collapse is a cheap minimum;
  #   state/trajectory/velocity co-training so the decoder is FORCED to use the per-clip latent
  #   (localize the ball) instead of rendering a dataset-average blob.
  target_lo: 0.05
  target_hi: 0.95
  charbonnier: 0.1
  foreground: 1.0
  foreground_gamma: 1.0
  ssim: 0.2
  ms_ssim: 0.2
  lpips: 0.0
  temporal_consistency: 0.25
  state: 1.0
  trajectory: 5.0
  velocity: 5.0

optim:
  lr: 5.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.999]
  warmup_steps: 100
  max_steps: 6000          # 2000 clips; override down for pilots (optim.max_steps=1500)
  scheduler: cosine
  grad_accum: 8            # batch_size 1 x accum 8 -> effective batch 8 (256px memory is tight)
  grad_clip: 1.0
  ema_decay: 0.9999

train:
  batch_size: 1            # 256px/16fr cross-attn is heavy; keep per-step memory low, use grad_accum
  num_workers: 0           # MUST be 0: LatentDataset caches shards PER WORKER, so >0 multiplies the
                           # ~55GB train cache by num_workers and OOMs CPU RAM (192G) at full scale
                           # (the pilot survived only because its cache was tiny). See scheduling memory.
  mixed_precision: bf16
  log_every: 50
  ckpt_every: 1000
  eval_every: 100000
  seed: 0
  deterministic: false
  resume: null

output_dir: outputs/runs/moving_ball_scene_decoder
latent_dir: outputs/latents/moving_ball_scene/train/vjepa2_large
wandb: false
tags: [moving_ball, scene_velocity, vjepa2, vit_l_24, decoder_depth12, diff_steering]
