# Step 2 (velocity-first): decoder for the clean moving-ball dataset (128x128, 32 frames).
# Same large transformer decoder as physics_iq_transformer_large.yaml, but sized for the moving-ball
# latent cache so it can be used for velocity steering (steer_velocity.py decodes at 128/32).
# Train:  LATENT_DIR=.../moving_ball_velocity/vjepa2_large sbatch scripts/slurm_train_decoder.sh
encoder:
  name: vjepa2
  hf_model_id: facebook/vjepa2-vitl-fpc64-256
  hidden_dim: 1024
  num_layers: 24
  num_heads: 16
  patch_size: 16
  tubelet_size: 2
  image_size: 128
  num_frames: 32
  frozen: true
  layers: [6, 12, 18, 23]   # multi-scale decoding from several layers

decoder:
  name: transformer
  mode: reconstruct
  hidden_dim: 1024
  depth: 24
  heads: 16
  mlp_ratio: 4.0
  dropout: 0.0
  num_query_tokens_per_frame: 256
  use_layer_embedding: true
  gradient_checkpointing: true
  out_image_size: 128
  out_num_frames: 32
  out_channels: 3

data:
  name: moving_ball
  root: null
  image_size: 128
  num_frames: 32
  fps: 8
  scenario: constant_velocity
  categories: all
  split: train
  num_clips: 512
  speed_range: [0.008, 0.038]
  radius_range: [0.07, 0.10]
  seed: 0

loss:
  charbonnier: 1.0
  ssim: 0.25
  ms_ssim: 0.25
  lpips: 0.0
  temporal_consistency: 0.5

optim:
  lr: 2.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.999]
  warmup_steps: 100
  max_steps: 4000
  scheduler: cosine
  grad_accum: 4
  grad_clip: 1.0
  ema_decay: 0.9999

train:
  batch_size: 2
  num_workers: 2
  mixed_precision: bf16
  log_every: 50
  ckpt_every: 1000
  eval_every: 100000
  seed: 0
  deterministic: false
  resume: null

output_dir: outputs/runs/moving_ball_decoder
latent_dir: outputs/latents/moving_ball_velocity/vjepa2_large
wandb: false
tags: [moving_ball, vjepa2, vit_l_24, decoder_large, velocity]
